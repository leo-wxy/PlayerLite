name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Resolve release version
        id: release-version
        shell: bash
        run: |
          version_name="${GITHUB_REF_NAME#v}"
          if [[ ! "$version_name" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported release tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          IFS='.' read -r major minor patch <<< "$version_name"
          version_code=$((10#$major * 1000000 + 10#$minor * 1000 + 10#$patch))
          if (( version_code <= 0 || version_code > 2100000000 )); then
            echo "Version code out of Android range: $version_code" >&2
            exit 1
          fi
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: >
          ./gradlew :app:assembleRelease
          -Pplayerlite.versionName=${{ steps.release-version.outputs.version_name }}
          -Pplayerlite.versionCode=${{ steps.release-version.outputs.version_code }}

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
